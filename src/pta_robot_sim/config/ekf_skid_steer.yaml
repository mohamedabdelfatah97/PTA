ekf_filter_node:
  ros__parameters:
    use_sim_time: true

    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # Raw wheel odometry from the skid-steer diff-drive controller
    odom0: /diff_drive_controller/odom
    odom0_config: [true,  true,  false,
                   false, false, false,
                   true,  false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 20
    odom0_nodelay: true

    # Use only one IMU for yaw + yaw rate
    # T265 performed excellently in your sim tests
    imu0: /t265/imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 50
    imu0_nodelay: true
    imu0_remove_gravitational_acceleration: false

