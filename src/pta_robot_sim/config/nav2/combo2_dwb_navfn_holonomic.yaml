# =======================================================================
# Combination 2 — DWB + NavFn (Holonomic/Mecanum Mode)
# Controller: DWB — vy enabled, full omnidirectional motion
# Planner:    NavFn — Dijkstra/A* grid search
# Purpose:    Test holonomic strafing with standard grid planner
#             Robot can move in all directions simultaneously
#
# Based on Combo 1 final config with these changes:
#   - min/max_vel_y: 0.0 → ±0.3 — lateral motion enabled
#   - acc/decel_lim_y: 0.0 → ±2.5 — Y acceleration enabled
#   - vy_samples: 0 → 20 — lateral trajectory sampling
#   - max_speed_xy: 0.2 → 0.30 — allows diagonal motion
#   - PathAlign.scale: 2.0 → 1.0 — softer heading alignment
#   - GoalAlign.scale: 1.0 → 0.5 — softer goal alignment
#   - velocity_smoother vy: 0.0 → ±0.3
# =======================================================================

amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_footprint
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.15
    laser_model_type: likelihood_field
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: nav2_amcl::OmniMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 2.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: /scan
    set_initial_pose: true
    initial_pose:
      x: 0.65
      y: 1.385
      z: 0.0
      yaw: 0.0

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    navigate_to_pose:
      plugin: nav2_bt_navigator/NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator/NavigateThroughPosesNavigator
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: true

    # 20 Hz is currently not sustainable in this sim.
    # The missed-rate spam means DWB is not evaluating consistently.
    controller_frequency: 10.0

    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.02
    min_theta_velocity_threshold: 0.02

    failure_tolerance: 0.5

    progress_checker_plugins: [progress_checker]
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]
    current_goal_checker: general_goal_checker

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.10
      movement_time_allowance: 6.0

    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.12
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: dwb_core::DWBLocalPlanner

      # Keep Combo 2 holonomic, but reduce unnecessary strafing.
      min_vel_x: 0.0
      max_vel_x: 0.16
      min_vel_y: -0.10
      max_vel_y: 0.10
      max_vel_theta: 0.75

      min_speed_xy: 0.0
      max_speed_xy: 0.20
      min_speed_theta: 0.0

      # Current values are very aggressive for a small sim room.
      acc_lim_x: 0.7
      acc_lim_y: 0.4
      acc_lim_theta: 1.2
      decel_lim_x: -0.7
      decel_lim_y: -0.4
      decel_lim_theta: -1.2

      # Huge CPU reduction:
      # old: 20 * 20 * 40 = 16000 trajectories
      # new: 10 * 5 * 14 = 700 trajectories
      vx_samples: 10
      vy_samples: 5
      vtheta_samples: 14

      sim_time: 1.2
      linear_granularity: 0.07
      angular_granularity: 0.05
      transform_tolerance: 0.5

      xy_goal_tolerance: 0.12
      trans_stopped_velocity: 0.04

      short_circuit_trajectory_evaluation: true
      stateful: true

      # Obstacle critics now dominate path-following.
      critics: [Oscillation, ObstacleFootprint, BaseObstacle, PathDist, GoalDist, PathAlign, GoalAlign, PreferForward, RotateToGoal, Twirling]

      # Collision avoidance / inflated-cost avoidance
      ObstacleFootprint.scale: 20.0
      BaseObstacle.scale: 8.0
      BaseObstacle.sum_scores: true

      # Path tracking, but not stronger than obstacle safety.
      PathDist.scale: 14.0
      GoalDist.scale: 8.0
      PathAlign.scale: 6.0
      PathAlign.forward_point_distance: 0.25
      GoalAlign.scale: 4.0
      GoalAlign.forward_point_distance: 0.25

      # Reduce unnecessary holonomic spinning / sideways-style behavior.
      PreferForward.scale: 3.0
      Twirling.scale: 2.0

      RotateToGoal.scale: 8.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true

      update_frequency: 3.0
      publish_frequency: 1.0

      global_frame: odom
      robot_base_frame: base_footprint
      transform_tolerance: 1.0

      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05

      footprint: "[[-0.35, -0.175], [-0.35, 0.175], [0.35, 0.175], [0.35, -0.175]]"
      footprint_padding: 0.06

      plugins: [obstacle_layer, inflation_layer]

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        footprint_clearing_enabled: false
        combination_method: 1
        observation_sources: scan_front scan_rear depth_camera

        scan_front:
          topic: /scan_front
          data_type: LaserScan
          marking: true
          clearing: true
          inf_is_valid: true
          observation_persistence: 0.8
          obstacle_max_range: 4.0
          obstacle_min_range: 0.15
          raytrace_max_range: 4.5
          raytrace_min_range: 0.15

        scan_rear:
          topic: /scan_rear
          data_type: LaserScan
          marking: true
          clearing: true
          inf_is_valid: true
          observation_persistence: 0.8
          obstacle_max_range: 4.0
          obstacle_min_range: 0.15
          raytrace_max_range: 4.5
          raytrace_min_range: 0.15

        depth_camera:
          topic: /d455_depth/points
          data_type: PointCloud2
          marking: true

          # Important first tuning pass:
          # Do not let the depth cloud clear obstacles.
          # Let front/rear lasers clear; let depth only add obstacles.
          clearing: false

          min_obstacle_height: 0.05
          max_obstacle_height: 1.2
          observation_persistence: 0.5
          obstacle_max_range: 2.0
          obstacle_min_range: 0.30
          raytrace_max_range: 2.5
          raytrace_min_range: 0.30

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.85
        cost_scaling_factor: 2.0

      always_send_full_costmap: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true

      update_frequency: 1.0
      publish_frequency: 0.5

      global_frame: map
      robot_base_frame: base_footprint
      transform_tolerance: 1.0

      footprint: "[[-0.35, -0.175], [-0.35, 0.175], [0.35, 0.175], [0.35, -0.175]]"
      footprint_padding: 0.06

      resolution: 0.05
      track_unknown_space: true

      plugins: [static_layer, obstacle_layer, inflation_layer]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        footprint_clearing_enabled: false
        tf_filter_tolerance: 0.3
        combination_method: 1
        observation_sources: scan_front scan_rear depth_camera

        scan_front:
          topic: /scan_front
          data_type: LaserScan
          marking: true
          clearing: true
          inf_is_valid: true
          observation_persistence: 2.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.15
          raytrace_max_range: 5.0
          raytrace_min_range: 0.15

        scan_rear:
          topic: /scan_rear
          data_type: LaserScan
          marking: true
          clearing: true
          inf_is_valid: true
          observation_persistence: 2.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.15
          raytrace_max_range: 5.0
          raytrace_min_range: 0.15

        depth_camera:
          topic: /d455_depth/points
          data_type: PointCloud2
          marking: true
          clearing: false
          min_obstacle_height: 0.05
          max_obstacle_height: 1.2
          observation_persistence: 1.5
          obstacle_max_range: 2.0
          obstacle_min_range: 0.30
          raytrace_max_range: 2.5
          raytrace_min_range: 0.30

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.85
        cost_scaling_factor: 2.0

      always_send_full_costmap: false

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: /home/pta-sim/pta_sim_ws/install/pta_robot_sim/share/pta_robot_sim/maps/test_room.yaml

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.1
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: [simple_smoother]
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, drive_on_heading, assisted_teleop, wait]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: false

    smoothing_frequency: 10.0
    scale_velocities: true
    feedback: OPEN_LOOP

    max_velocity: [0.16, 0.10, 0.75]
    min_velocity: [-0.08, -0.10, -0.75]

    max_accel: [0.7, 0.4, 1.2]
    max_decel: [-0.7, -0.4, -1.2]

    odom_topic: /odometry/filtered
    odom_duration: 0.2

    deadband_velocity: [0.01, 0.02, 0.02]
    velocity_timeout: 1.0

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: false
    bond_timeout: 15.0
    node_names:
      - map_server
      - amcl

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: false
    bond_timeout: 15.0
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother