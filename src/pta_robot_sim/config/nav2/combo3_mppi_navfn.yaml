# =======================================================================
# Combination 3 — MPPI + NavFn (Holonomic/Mecanum Mode)
# Controller: MPPI — native Omni motion model
# Planner:    NavFn — Dijkstra/A* grid search
#
# CLEAN LIDAR TEST VERSION
#
# Main change:
#   Costmaps now use raw A2/A3 lidar topics directly:
#     /scan_front
#     /scan_rear
#
# Temporarily disabled from costmaps:
#   /scan merged topic
#   /d455_depth/points
#   /safety_obstacle_cloud_global
#   /safety_obstacle_cloud_local
#
# Goal:
#   Prove front + rear lidars alone can mark/clear obstacles correctly.
# =======================================================================

amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_footprint
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.15
    laser_model_type: likelihood_field
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: nav2_amcl::OmniMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 2.0
    update_min_a: 0.08
    update_min_d: 0.05
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

    # Keep AMCL on merged scan for now.
    # Costmaps below use /scan_front and /scan_rear directly.
    scan_topic: /scan

    set_initial_pose: true
    initial_pose:
      x: 0.65
      y: 1.385
      z: 0.0
      yaw: 0.0

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: /home/pta-sim/pta_sim_ws/install/pta_robot_sim/share/pta_robot_sim/behavior_trees/navigate_to_pose_combo3.xml
    always_reload_bt_xml: true

    navigate_to_pose:
      plugin: nav2_bt_navigator/NavigateToPoseNavigator

    navigate_through_poses:
      plugin: nav2_bt_navigator/NavigateThroughPosesNavigator

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 2.0

    progress_checker_plugins: [progress_checker]
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]
    current_goal_checker: general_goal_checker

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.06
      movement_time_allowance: 18.0

    general_goal_checker:
      stateful: false
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.55
      yaw_goal_tolerance: 1.57

    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      motion_model: Omni

      time_steps: 35
      model_dt: 0.10
      batch_size: 800
      iteration_count: 1
      prune_distance: 1.5
      transform_tolerance: 0.5
      temperature: 0.3
      gamma: 0.015
      visualize: false
      reset_period: 1.0
      regenerate_noises: false

      vx_max: 0.07
      vx_min: 0.0
      vy_max: 0.56
      wz_max: 0.14

      ax_max: 0.22
      ax_min: -0.30
      ay_max: 1.40
      ay_min: -1.40
      az_max: 0.25

      vx_std: 0.035
      vy_std: 0.60
      wz_std: 0.05

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 1.6
        consider_footprint: true

      critics:
        - ConstraintCritic
        - CostCritic
        - GoalCritic
        - GoalAngleCritic
        - PathFollowCritic
        - PathAngleCritic
        - PathAlignCritic
        - PreferForwardCritic
        - TwirlingCritic

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 50.0
        critical_cost: 120.0
        near_collision_cost: 5000.0
        consider_footprint: true
        collision_cost: 1000000.0
        inflation_layer_name: "inflation_layer"
        near_goal_distance: 0.5
        trajectory_point_step: 1

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.5
        threshold_to_consider: 0.6

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 0.0
        threshold_to_consider: 0.10

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 2
        threshold_to_consider: 0.8

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 0.0
        offset_from_furthest: 20
        threshold_to_consider: 0.5
        max_angle_to_furthest: 0.8
        mode: 0

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.5
        max_path_occupancy_ratio: 0.85
        trajectory_point_step: 1
        threshold_to_consider: 0.8
        offset_from_furthest: 4
        use_path_orientations: false

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 0.0
        threshold_to_consider: 0.5

      TwirlingCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 3.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint

      # Keep global footprint SMALL. This is only for route feasibility.
      # Local MPPI does the real collision safety.
      footprint: "[[0.40, 0.24], [0.40, -0.24], [-0.52, -0.24], [-0.52, 0.24]]"
      footprint_padding: 0.001

      resolution: 0.05
      track_unknown_space: true
      always_send_full_costmap: true

      plugins:
        - static_layer
        - obstacle_layer
        - inflation_layer

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: scan_front scan_rear

        scan_front:
          topic: /scan_front
          data_type: LaserScan
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          obstacle_min_range: 0.15
          obstacle_max_range: 3.5
          raytrace_min_range: 0.15
          raytrace_max_range: 4.0
          observation_persistence: 0.0

        scan_rear:
          topic: /scan_rear
          data_type: LaserScan
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          obstacle_min_range: 0.15
          obstacle_max_range: 3.5
          raytrace_min_range: 0.15
          raytrace_max_range: 4.0
          observation_persistence: 0.0

        # Disabled for lidar-only test:
        #
        # depth_camera:
        #   topic: /d455_depth/points
        #   data_type: PointCloud2
        #   clearing: false
        #   marking: true
        #   obstacle_min_range: 0.30
        #   obstacle_max_range: 1.8
        #   raytrace_min_range: 0.30
        #   raytrace_max_range: 2.0
        #   min_obstacle_height: 0.05
        #   max_obstacle_height: 1.5
        #   observation_persistence: 0.0
        #
        # safety_cloud_global:
        #   topic: /safety_obstacle_cloud_global
        #   data_type: PointCloud2
        #   marking: true
        #   clearing: false
        #   obstacle_min_range: 0.0
        #   obstacle_max_range: 10.0
        #   raytrace_min_range: 0.0
        #   raytrace_max_range: 10.0
        #   min_obstacle_height: 0.0
        #   max_obstacle_height: 1.5
        #   observation_persistence: 0.25

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.5
        inflation_radius: 0.38

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 8.0
      publish_frequency: 4.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05

      # Larger local footprint for MPPI collision checking.
      footprint: "[[0.57, 0.38], [0.57, -0.38], [-0.75, -0.38], [-0.75, 0.38]]"
      footprint_padding: 0.04

      always_send_full_costmap: true

      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        footprint_clearing_enabled: true

        # CLEAN TEST:
        # Use raw A2/A3 lidars directly.
        # Safety cloud and depth camera are disabled for now.
        observation_sources: scan_front scan_rear

        scan_front:
          topic: /scan_front
          data_type: LaserScan
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          obstacle_min_range: 0.15
          obstacle_max_range: 3.5
          raytrace_min_range: 0.15
          raytrace_max_range: 4.0
          observation_persistence: 0.10

        scan_rear:
          topic: /scan_rear
          data_type: LaserScan
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          obstacle_min_range: 0.15
          obstacle_max_range: 3.5
          raytrace_min_range: 0.15
          raytrace_max_range: 4.0
          observation_persistence: 0.10

        # Disabled for lidar-only test:
        #
        # depth_camera:
        #   topic: /d455_depth/points
        #   data_type: PointCloud2
        #   marking: true
        #   clearing: false
        #   obstacle_max_range: 2.2
        #   obstacle_min_range: 0.30
        #   raytrace_max_range: 2.5
        #   raytrace_min_range: 0.30
        #   min_obstacle_height: 0.05
        #   max_obstacle_height: 2.0
        #   observation_persistence: 0.15
        #
        # safety_cloud_local:
        #   topic: /safety_obstacle_cloud_local
        #   data_type: PointCloud2
        #   marking: true
        #   clearing: false
        #   obstacle_min_range: 0.0
        #   obstacle_max_range: 10.0
        #   raytrace_min_range: 0.0
        #   raytrace_max_range: 10.0
        #   min_obstacle_height: 0.0
        #   max_obstacle_height: 1.5
        #   observation_persistence: 0.25

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 4.0
        inflation_radius: 0.42

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: /home/pta-sim/pta_sim_ws/install/pta_robot_sim/share/pta_robot_sim/maps/test_room.yaml

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 3.0
    planner_plugins: [GridBased]

    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.25
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: [simple_smoother]

    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 200
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 5.0

    behavior_plugins:
      - spin
      - backup
      - drive_on_heading
      - assisted_teleop
      - wait

    spin:
      plugin: nav2_behaviors/Spin

    backup:
      plugin: nav2_behaviors/BackUp

    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading

    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop

    wait:
      plugin: nav2_behaviors/Wait

    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.35
    min_rotational_vel: 0.05
    rotational_acc_lim: 0.60

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint

    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"

    max_velocity: [0.22, 0.56, 0.26]
    min_velocity: [0.0, -0.56, -0.26]
    max_accel: [0.55, 1.40, 0.70]
    max_decel: [-0.55, -1.40, -0.70]

    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 15.0
    node_names:
      - map_server
      - amcl

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 15.0
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother