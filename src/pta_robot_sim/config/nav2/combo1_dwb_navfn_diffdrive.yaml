# =======================================================================
# Combination 1 — DWB + NavFn (Differential Drive Mode)
# Controller: DWB — vy disabled, forward/backward + rotation only
# Planner:    NavFn — Dijkstra/A* grid search
# Purpose:    Baseline test — robot behaves like diff drive
#             No strafing, must rotate to change direction
#
# Fix round 1:
#   - obstacle_layer replaces voxel_layer
#   - inflation_radius: 0.50, cost_scaling_factor: 5.0
#   - observation_persistence: 0.3
#   - obstacle/raytrace range covers full room
#   - critics simplified: no PathAlign/GoalAlign
#   - progress_checker tightened
#
# Fix round 2:
#   - RotateToGoal removed — causes post-goal spinning
#   - stateful: false on goal checker — stops cleaner
#   - trans_stopped_velocity: 0.05
#   - inflation_radius: 0.40/0.42, cost_scaling_factor: 8.0
#
# Fix round 3:
#   - BaseObstacle.scale: 0.10 → 0.35 — stronger obstacle penalty
#   - PathDist: 12 → 6, GoalDist: 10 → 4 — less path dominance
#   - PathAlign + GoalAlign added back gently (scale 4.0 / 2.0)
#   - max_vel_x: 0.3 → 0.2 — slower for tighter maneuvers
#   - sim_time: 1.7 → 1.0 — shorter rollout, less overcommit
#   - vtheta_samples: 20 → 40 — more rotation options
#   - max_vel_theta: 1.0 → 1.2 — more angular authority
#   - inflation_radius: 0.38/0.40, cost_scaling_factor: 5.0
#
# Fix round 4:
#   - Custom BT added — was using Nav2 default (no rate-controlled replanning)
#     Reuses navigate_to_pose_combo3.xml: 2Hz replanning + costmap clearing recovery
#   - odom_topic: /odometry/filtered added to controller_server — was missing,
#     bt_navigator and velocity_smoother used filtered odom but controller did not
#   - BaseObstacle.scale: 0.50 → 3.0 — path critics were 8x stronger, robot drove
#     straight through obstacles ignoring avoidance
#   - observation_persistence: 1.0 → 0.0 — ghost obstacles in sim causing false avoidance
#   - min_vel_x: 0.0 → -0.10 — robot couldn't reverse at all, stuck in recovery loops
#   - max_vel_x: 0.20 → 0.15, max_vel_theta: 1.2 → 0.8 — conservative baseline speeds
#   - sim_time: 1.0 → 0.8 — shorter rollout, less overcommit for diff drive
#   - trans_stopped_velocity: 0.05 → 0.03 — cleaner stop
#   - velocity_smoother feedback: OPEN_LOOP → CLOSED_LOOP — matches combo3
#   - velocity_smoother max/min_velocity aligned to new speed limits
#
# Fix round 5:
#   - cost_scaling_factor: 5.0 → 3.0 (both costmaps) — matches combo3 proven value
#     Sharp dropoff at 5.0 meant NavFn saw almost no cost difference between routing
#     around vs through an obstacle. 3.0 gives a wider gradient NavFn can follow.
#   - Added depth_camera to local costmap — D455 /d455_depth/points catches thin
#     objects (unit_box) that LiDAR rays pass through
#   - obstacle_max_range: 4.5 → 5.0 in global costmap — matches combo3
#   - raytrace_min_range: 0.0 added to global costmap scan — matches combo3
#   - max_vel_x: 0.15 → 0.10, max_vel_theta: 0.8 → 0.5 — reduce jerkiness on NUC
# =======================================================================

amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_footprint
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.15
    laser_model_type: likelihood_field
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: nav2_amcl::OmniMotionModel # DifferentialMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 2.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: /scan
    set_initial_pose: true
    initial_pose:
      x: 0.5
      y: 1.385
      z: 0.0
      yaw: 0.0

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: /home/pta-sim/pta_sim_ws/install/pta_robot_sim/share/pta_robot_sim/behavior_trees/navigate_to_pose_combo3.xml
    always_reload_bt_xml: true
    navigate_to_pose:
      plugin: nav2_bt_navigator/NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator/NavigateThroughPosesNavigator
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    odom_topic: /odometry/filtered   # added — was missing, controller was using wrong odom source
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: [progress_checker]
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]
    # Tightened — fails faster so recovery behaviors trigger sooner
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.20 # was 0,15
      movement_time_allowance: 8.0 # was 3.0
    # stateful: false — stops cleaner without yaw settling phase
    general_goal_checker:
      stateful: false
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.08
      yaw_goal_tolerance: 10.0 # was 6.28
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      # Diff drive — no lateral motion
      min_vel_x: -0.10 # allow slight reverse for recovery
      max_vel_x: 0.10  # was 0.15 — reduced to minimize jerk on NUC
      min_vel_y: 0.0
      max_vel_y: 0.0
      max_vel_theta: 0.5  # was 0.8 — reduced to minimize jerk on NUC
      min_speed_xy: 0.0
      max_speed_xy: 0.10  # matches max_vel_x
      min_speed_theta: 0.0
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 0
      vtheta_samples: 40
      sim_time: 0.8    # reduced from 1.5 — shorter rollout, less overcommit for diff drive
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.08
      trans_stopped_velocity: 0.03  # was 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: [Oscillation, BaseObstacle, PathAlign, GoalAlign, PathDist, GoalDist]
      BaseObstacle.scale: 3.0 # was 0.50 — too weak, path critics were 8x stronger causing straight-line behavior
      PathAlign.scale: 2.0
      PathAlign.forward_point_distance: 0.05
      GoalAlign.scale: 1.0
      GoalAlign.forward_point_distance: 0.05
      PathDist.scale: 4.0
      GoalDist.scale: 2.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 10.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 4 # was 3
      height: 4 # was 3
      resolution: 0.05
      footprint: "[[-0.35, -0.175], [-0.35, 0.175], [0.35, 0.175], [0.35, -0.175]]"
      plugins: [obstacle_layer, inflation_layer]
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.38
        cost_scaling_factor: 3.0          # was 5.0 — matches combo3, wider gradient
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: scan depth_camera
        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true
          inf_is_valid: true
          observation_persistence: 0.0
          obstacle_max_range: 4.5
          raytrace_max_range: 5.0
        depth_camera:                     # added — D455 catches thin objects LiDAR misses
          topic: /d455_depth/points
          data_type: PointCloud2
          marking: true
          clearing: true
          min_obstacle_height: 0.05
          max_obstacle_height: 2.0
          observation_persistence: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      footprint: "[[-0.35, -0.175], [-0.35, 0.175], [0.35, 0.175], [0.35, -0.175]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        footprint_clearing_enabled: false
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          marking: true
          clearing: true
          inf_is_valid: true
          observation_persistence: 0.0
          obstacle_max_range: 5.0          # was 4.5 — matches combo3, detects from further
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0          # added — matches combo3
          transform_tolerance: 1.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.42
        cost_scaling_factor: 3.0          # was 5.0 — matches combo3, key fix for path routing around obstacles
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: /home/pta-sim/pta_sim_ws/install/pta_robot_sim/share/pta_robot_sim/maps/test_room.yaml

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.1 # was 0.5
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: [simple_smoother]
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, drive_on_heading, assisted_teleop, wait]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: CLOSED_LOOP
    max_velocity: [0.10, 0.0, 0.5]
    min_velocity: [-0.10, 0.0, -0.5]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: false
    bond_timeout: 15.0
    node_names:
      - map_server
      - amcl

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: false
    bond_timeout: 15.0
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother