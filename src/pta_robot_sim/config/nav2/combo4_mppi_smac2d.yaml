# =======================================================================
# Combination 4 — MPPI + SmacPlanner2D Holonomic Baseline v1
#
# Purpose:
#   Strong baseline for mecanum/omni navigation before deeper tuning.
#
# Design imported from the working Combo 3 lessons:
#   - Keep MPPI Omni.
#   - Block reverse x motion.
#   - Allow strong lateral y motion.
#   - Keep global costmap permissive in the tiny test_room map.
#   - Keep local costmap slightly safer than global, but avoid huge inflation.
#   - Use scan + D455 depth in both global and local costmaps.
#   - Use a custom no-backup NavigateToPose tree.
#
# Install with:
#   cp combo4_mppi_smac2d_holonomic_baseline_v1.yaml \
#      ~/pta_sim_ws/src/pta_robot_sim/config/nav2/combo4_mppi_smac2d.yaml
#   cp navigate_to_pose_combo4_no_backup.xml \
#      ~/pta_sim_ws/src/pta_robot_sim/behavior_trees/navigate_to_pose_combo4.xml
# =======================================================================

amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_footprint
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.15
    laser_model_type: likelihood_field
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: nav2_amcl::OmniMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 2.0
    update_min_a: 0.08
    update_min_d: 0.05
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: /scan
    set_initial_pose: true
    initial_pose:
      x: 0.65
      y: 1.385
      z: 0.0
      yaw: 0.0
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    navigate_to_pose:
      plugin: nav2_bt_navigator/NavigateToPoseNavigator
    navigate_through_poses:
      plugin: nav2_bt_navigator/NavigateThroughPosesNavigator
    plugin_lib_names:
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_compute_path_through_poses_action_bt_node
    - nav2_smooth_path_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_wait_action_bt_node
    - nav2_assisted_teleop_action_bt_node
    - nav2_back_up_action_bt_node
    - nav2_drive_on_heading_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_goal_reached_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_globally_updated_goal_condition_bt_node
    - nav2_is_path_valid_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_truncate_path_local_action_bt_node
    - nav2_goal_updater_node_bt_node
    - nav2_recovery_node_bt_node
    - nav2_pipeline_sequence_bt_node
    - nav2_round_robin_node_bt_node
    - nav2_transform_available_condition_bt_node
    - nav2_time_expired_condition_bt_node
    - nav2_distance_traveled_condition_bt_node
    - nav2_single_trigger_bt_node
    - nav2_goal_updated_controller_bt_node
    - nav2_is_battery_low_condition_bt_node
    - nav2_navigate_through_poses_action_bt_node
    - nav2_navigate_to_pose_action_bt_node
    - nav2_remove_passed_goals_action_bt_node
    - nav2_planner_selector_bt_node
    - nav2_controller_selector_bt_node
    - nav2_goal_checker_selector_bt_node
    - nav2_controller_cancel_bt_node
    - nav2_path_longer_on_approach_bt_node
    - nav2_wait_cancel_bt_node
    - nav2_spin_cancel_bt_node
    - nav2_back_up_cancel_bt_node
    - nav2_assisted_teleop_cancel_bt_node
    - nav2_drive_on_heading_cancel_bt_node
    - nav2_is_battery_charging_condition_bt_node
    default_nav_to_pose_bt_xml: /home/pta-sim/pta_sim_ws/install/pta_robot_sim/share/pta_robot_sim/behavior_trees/navigate_to_pose_combo4.xml
    always_reload_bt_xml: true
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 2.0
    progress_checker_plugins:
    - progress_checker
    goal_checker_plugins:
    - general_goal_checker
    controller_plugins:
    - FollowPath
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.02
      movement_time_allowance: 45.0
    general_goal_checker:
      stateful: false
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.45
      yaw_goal_tolerance: 1.57
    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      motion_model: Omni
      time_steps: 40
      model_dt: 0.05
      batch_size: 1200
      iteration_count: 1
      prune_distance: 1.5
      transform_tolerance: 0.5
      temperature: 0.3
      gamma: 0.015
      visualize: false
      reset_period: 1.0
      regenerate_noises: false
      vx_max: 0.36
      vx_min: 0.0
      vy_max: 0.62
      vy_min: -0.62
      wz_max: 0.52
      ax_max: 0.8
      ax_min: -0.8
      ay_max: 2.2
      ay_min: -2.2
      az_max: 1.5
      vx_std: 0.22
      vy_std: 0.45
      wz_std: 0.32
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      TrajectoryValidator:
        plugin: mppi::DefaultOptimalTrajectoryValidator
        collision_lookahead_time: 2.0
        consider_footprint: true
      critics:
      - ConstraintCritic
      - CostCritic
      - GoalCritic
      - GoalAngleCritic
      - PathFollowCritic
      - PathAngleCritic
      - PathAlignCritic
      - PreferForwardCritic
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        critical_cost: 220.0
        near_collision_cost: 1000.0
        consider_footprint: true
        collision_cost: 1000000.0
        inflation_layer_name: inflation_layer
        near_goal_distance: 0.5
        trajectory_point_step: 1
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.6
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 0.0
        threshold_to_consider: 0.1
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 6
        threshold_to_consider: 0.6
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 0.0
        offset_from_furthest: 20
        threshold_to_consider: 0.5
        max_angle_to_furthest: 0.8
        mode: 0
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 0.8
        max_path_occupancy_ratio: 0.3
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 0.0
        threshold_to_consider: 0.5
    current_goal_checker: general_goal_checker
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3.0
      height: 3.0
      resolution: 0.05
      footprint: '[[0.42, 0.25], [0.42, -0.25], [-0.45, -0.25], [-0.45, 0.25]]'
      plugins:
      - obstacle_layer
      - inflation_layer
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 8.0
        inflation_radius: 0.36
      always_send_full_costmap: true
      footprint_padding: 0.02
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan depth_camera
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 4.0
          raytrace_min_range: 0.15
          obstacle_max_range: 3.5
          obstacle_min_range: 0.15
          observation_persistence: 0.0
        depth_camera:
          topic: /d455_depth/points
          max_obstacle_height: 1.2
          min_obstacle_height: 0.08
          clearing: true
          marking: true
          data_type: PointCloud2
          raytrace_max_range: 2.2
          raytrace_min_range: 0.6
          obstacle_max_range: 2.0
          obstacle_min_range: 0.6
          observation_persistence: 0.0
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 3.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      footprint: '[[0.36, 0.20], [0.36, -0.20], [-0.38, -0.20], [-0.38, 0.20]]'
      resolution: 0.05
      track_unknown_space: true
      plugins:
      - static_layer
      - obstacle_layer
      - inflation_layer
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan depth_camera
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 4.0
          raytrace_min_range: 0.15
          obstacle_max_range: 3.5
          obstacle_min_range: 0.15
          observation_persistence: 0.0
        depth_camera:
          topic: /d455_depth/points
          max_obstacle_height: 1.2
          min_obstacle_height: 0.08
          clearing: false
          marking: true
          data_type: PointCloud2
          raytrace_max_range: 2.0
          raytrace_min_range: 0.6
          obstacle_max_range: 1.8
          obstacle_min_range: 0.6
          observation_persistence: 0.0
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 8.0
        inflation_radius: 0.22
      always_send_full_costmap: true
      footprint_padding: 0.005
map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: /home/pta-sim/pta_sim_ws/install/pta_robot_sim/share/pta_robot_sim/maps/test_room.yaml
map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins:
    - GridBased
    GridBased:
      plugin: nav2_smac_planner/SmacPlanner2D
      tolerance: 0.6
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 1.5
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins:
    - simple_smoother
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true
behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
    - spin
    - backup
    - drive_on_heading
    - assisted_teleop
    - wait
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.6
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.5
waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 30.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity:
    - 0.36
    - 0.62
    - 0.52
    min_velocity:
    - 0.0
    - -0.62
    - -0.52
    max_accel:
    - 0.8
    - 2.4
    - 1.5
    max_decel:
    - -0.8
    - -2.4
    - -1.5
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity:
    - 0.0
    - 0.0
    - 0.0
    velocity_timeout: 1.0
lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: false
    bond_timeout: 15.0
    node_names:
    - map_server
    - amcl
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: false
    bond_timeout: 15.0
    node_names:
    - controller_server
    - smoother_server
    - planner_server
    - behavior_server
    - bt_navigator
    - waypoint_follower
    - velocity_smoother